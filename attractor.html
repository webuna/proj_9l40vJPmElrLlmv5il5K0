<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Drift</title>
<style>
  html, body { margin: 0; height: 100%; background: #05060a; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
  .hud {
    position: fixed; left: 14px; bottom: 12px;
    font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: rgba(220, 230, 255, 0.55); user-select: none; pointer-events: none;
    letter-spacing: 0.04em;
  }
  .hud b { color: rgba(220, 230, 255, 0.85); font-weight: 600; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
  drift &nbsp;·&nbsp;
  <b>move</b> nudge &nbsp;·&nbsp;
  <b>click</b> reseed
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0, cx = 0, cy = 0, scale = 1;

  function resize() {
    W = canvas.width  = Math.floor(innerWidth  * DPR);
    H = canvas.height = Math.floor(innerHeight * DPR);
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
    cx = W / 2; cy = H / 2;
    scale = Math.min(W, H) * 0.22;
    ctx.fillStyle = '#05060a';
    ctx.fillRect(0, 0, W, H);
  }
  addEventListener('resize', resize);
  resize();

  // Clifford attractor:
  //   x' = sin(a*y) + c*cos(a*x)
  //   y' = sin(b*x) + d*cos(b*y)
  // Parameters drift on slow sinusoids so the shape morphs continuously.
  const phase = [Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28];
  const period = [17000, 23000, 29000, 31000]; // ms — coprime-ish so it doesn't loop visibly

  function params(t) {
    return [
      -1.7 + 0.7 * Math.sin(t / period[0] * 2 * Math.PI + phase[0]),
       1.3 + 0.9 * Math.sin(t / period[1] * 2 * Math.PI + phase[1]),
      -1.1 + 0.8 * Math.sin(t / period[2] * 2 * Math.PI + phase[2]),
       1.6 + 0.6 * Math.sin(t / period[3] * 2 * Math.PI + phase[3]),
    ];
  }

  let x = 0.1, y = 0.1;
  const ITER_PER_FRAME = 9000;
  const FADE = 0.018;       // trail persistence
  const POINT_ALPHA = 0.18;

  const mouse = { x: 0, y: 0, active: false, vx: 0, vy: 0 };
  addEventListener('pointermove', e => {
    const nx = e.clientX * DPR, ny = e.clientY * DPR;
    mouse.vx = nx - mouse.x; mouse.vy = ny - mouse.y;
    mouse.x = nx; mouse.y = ny; mouse.active = true;
  });
  addEventListener('pointerleave', () => { mouse.active = false; });
  addEventListener('pointerdown', () => {
    for (let i = 0; i < 4; i++) phase[i] = Math.random() * 6.28;
    x = (Math.random() - 0.5) * 0.4;
    y = (Math.random() - 0.5) * 0.4;
  });

  function frame(now) {
    // Soft trail fade.
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = `rgba(5, 6, 10, ${FADE})`;
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'lighter';

    const [a, b, c, d] = params(now);

    // Mouse adds a tiny perturbation that the attractor amplifies — a gentle nudge.
    const mx = mouse.active ? (mouse.x - cx) / scale : 0;
    const my = mouse.active ? (mouse.y - cy) / scale : 0;
    const nudge = mouse.active ? 0.0015 : 0;

    const hue = (200 + Math.sin(now * 0.00007) * 60 + now * 0.004) % 360;

    for (let i = 0; i < ITER_PER_FRAME; i++) {
      const xn = Math.sin(a * y) + c * Math.cos(a * x) + mx * nudge;
      const yn = Math.sin(b * x) + d * Math.cos(b * y) + my * nudge;
      x = xn; y = yn;

      const px = cx + x * scale;
      const py = cy + y * scale;

      // Hue varies with point position — gives the shape internal color structure.
      const localHue = (hue + (x + y) * 18) % 360;
      ctx.fillStyle = `hsla(${localHue}, 90%, 62%, ${POINT_ALPHA})`;
      ctx.fillRect(px, py, DPR, DPR);
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
